    project: rsa
    name: mamba2-7b-cosine

training_parameters:
  num_training_steps: 25000
  eval_interval: 2500
  micro_batch_size: 4
  gradient_accumulation_steps: 4
  eval_during_training: true

optimizer_args:
  class_name: TorchAdamW
  class_args:
    lr: 3e-4
    weight_decay: 0.1
    betas:
      - 0.9
      - 0.95
    eps: 1e-10

lr_scheduler_args:
  lr_decay_style: cosine
  num_warmup_steps: 2500
  num_constant_steps: 0
  num_decay_steps: 22500

mixed_precision_args:
  dtype: bf16

distributed_args:
  stage: 0
  torch_compile: true
