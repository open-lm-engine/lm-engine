datasets:
  # class_name - data_name & data_sampling_ratio are not used but need to be passed to avoid errors
  - class_name: MegatronDataset
    data_name: Megatron
    data_sampling_ratio: 1
    class_args:
      eval_steps: 2
      data_cache_path: data-cache
      # Option 1: data loading using --data-path with single file
      data_path:
        - datasets/nemotron-cc-hq
      split: 99.5,0.5,0
      # split: 1,0,0
      sequence_length: 4096

tokenizer_args:
  tokenizer_name: open-lm-engine/hybrid-m2rnn-410m

kernel_args:
  kernels:
    - rnn
    - gru
    - m2rnn
    - causal_conv1d
    - mamba2_ssm
    - flash_attention_3
    - sonicmoe

