tuning_args:
  tuning_method: pretraining

save_args:
  save_path: checkpoints/rnn-7b-cosine
  save_interval: 5000

# load_args:
#   load_path: checkpoints/rnn-7b-cosine

logging_args:
  log_interval: 10
  # torch_profiler_trace_path: tmp
  experiments_tracker_name: wandb
  wandb_args:
    project: m2rnn
    name: rnn-7b-cosine

training_parameters:
  num_training_steps: 25000
  eval_interval: 2500
  micro_batch_size: 4
  gradient_accumulation_steps: 4
  eval_during_training: true

optimizer_args:
  class_name: TorchAdamW
  class_args:
    lr: 3e-4
    weight_decay: 0.1
    betas:
      - 0.9
      - 0.95
    eps: 1e-10

lr_scheduler_args:
  lr_decay_style: cosine
  num_warmup_steps: 2500
  num_constant_steps: 0
  num_decay_steps: 22500

mixed_precision_args:
  dtype: bf16

distributed_args:
  stage: 3
  torch_compile: true
  zero_topology:
    data_parallel_replication_world_size: 8
    data_parallel_sharding_world_size: 8
