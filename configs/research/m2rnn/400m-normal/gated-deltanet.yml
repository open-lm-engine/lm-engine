    initializer_range: 0.02
    layer_norm_epsilon: 1e-05
    model_type: gpt_base
    normalization_function: rmsnorm
    position_embedding_type: nope
    hidden_size: 1024
    num_layers: 24
    init_method: normal
    bos_token_id: 100257
    eos_token_id: 100257
    pad_token_id: 100256
    vocab_size: 100352
    max_position_embeddings: 4096
    sequence_mixer_blocks:
