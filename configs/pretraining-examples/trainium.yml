save_args:
  save_path: checkpoints
  save_interval: 5000

training_parameters:
  num_training_steps: 5000
  eval_interval: 50
  micro_batch_size: 8
  gradient_accumulation_steps: 1
  eval_during_training: false

optimizer_args:
  class_name: TorchAdamW
  class_args:
    lr: 1e-5
    weight_decay: 0.1
    betas:
      - 0.9
      - 0.95
    eps: 1e-10

lr_scheduler_args:
  lr_decay_style: cosine

mixed_precision_args:
  dtype: bf16

distributed_args:
  fsdp_algorithm: 2
  stage: 3
