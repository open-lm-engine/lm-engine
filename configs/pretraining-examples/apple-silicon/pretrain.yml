datasets:
  # class_name, data_name & data_sampling_ratio are not used but need to be passed to avoid errors
  - class_name: MegatronDataset
    data_name: Megatron
    data_sampling_ratio: 1
    class_args:
      eval_steps: 2
      data_cache_path: cache
      # Option 1: data loading using --data-path with single file
      data_path:
        - data_text
      split: 99.5,0.5,0
      #   - data/lang=Matlab
      # split: 98,1,1
      sequence_length: 2048

tokenizer_args:
  tokenizer_name: bigcode/starcoder

model_args:
  pretrained_config:
    model_type: gpt_base
    vocab_size: 50257
    max_position_embeddings: 2048
    hidden_size: 768
    num_layers: 2
    normalization_function: layernorm
    layer_norm_epsilon: 1e-5
    initializer_range: 0.02
    bos_token_id: 0
    eos_token_id: 0
    pad_token_id: 0
    sequence_mixer_blocks:
      - sequence_mixer_type: softmax_attention
        num_attention_heads: 12
        num_key_value_heads: 12
        attention_multiplier: 0.015625
        add_bias: false
      - sequence_mixer_type: softmax_attention
        num_attention_heads: 12
        num_key_value_heads: 12
        attention_multiplier: 0.015625
        add_bias: false
    mlp_blocks:
      - activation_function: swiglu
        mlp_type: MLP
        add_bias: false
        intermediate_size: 1408
      - activation_function: swiglu
        mlp_type: MLP
        add_bias: false
        intermediate_size: 1408

tuning_args:
  tuning_method: pretraining

save_args:
  save_path: checkpoints/softmax-attention
  save_interval: 5000

training_parameters:
  num_training_steps: 25000
  eval_interval: 2500
  micro_batch_size: 4
  gradient_accumulation_steps: 1
  eval_during_training: true

optimizer_args:
  class_name: TorchAdamW
  class_args:
    lr: 1e-5
    weight_decay: 0.1
    betas:
      - 0.9
      - 0.95
    eps: 1e-10

lr_scheduler_args:
  lr_decay_style: cosine

mixed_precision_args:
  dtype: bf16

distributed_args:
  stage: 0
  torch_compile: true
  fsdp_algorithm: null
