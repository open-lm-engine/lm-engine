datasets:
  - class_name: MegatronDataset
    data_name: Megatron
    data_sampling_ratio: 1
    class_args:
      eval_steps: 2
      data_cache_path: dummy
      data_path:
        dummy
      split: 100,0,0
      sequence_length: 512

tokenizer_args:
  tokenizer_name: open-lm-engine/m2rnn-400m

model_args:
  pretrained_config:
    initializer_range: 0.1
    layer_norm_epsilon: 1e-05
    model_type: gpt_base
    hidden_size: 512
    num_layers: 4
    max_position_embeddings: 512
    normalization_function: rmsnorm
    embedding_dropout: 0
    position_embedding_type: rope
    rope_theta: 10000
    rope_scaling: null
    rope_dim: 64
    vocab_size: 50304
    tie_word_embeddings: true
    bos_token_id: 100257
    eos_token_id: 100257
    pad_token_id: 100256
    m_width: 9
    m_emb: 12
    m_residual: 0.22
    init_method: mup
    embedding_init_method: normal
    use_depth_scaled_init: true
    use_cache: true
    router_aux_loss_coef: 0.001
    sequence_mixer_blocks:
      - sequence_mixer_type: softmax_attention
        num_attention_heads: 16
        num_key_value_heads: 16
        head_dim: null
        softmax_dropout: 0
        dropout: 0
        add_bias: true
        attention_multiplier: null
        attention_multiplier_method: "1 / sqrt(head_dim)"
        attention_gate: false
        exclusive_self_attention: false
        sliding_window: null
      - sequence_mixer_type: mamba2
        state_size: 128
        intermediate_size: 1024
        num_heads: 128
        conv_kernel_size: 4
        time_step_limit:
          - 0
          - .inf
        add_bias: true
        use_conv_bias: true
        activation_function: silu
        num_groups: 8
        chunk_size: 256
        normalization_function: rmsnorm
        A_init_min: 0
        A_init_max: 16
        dt_init_min: 0.001
        dt_init_max: 0.1
        dt_init_floor: 0.0001
      - sequence_mixer_type: rnn
        state_head_dim: 16
        num_input_heads: 1
        num_weight_heads: 1
        add_bias: true
        normalization_function: null
        gradient_clipping: null
        kernel_size: null
        activation_function: null
      - sequence_mixer_type: gru
        state_head_dim: 16
        num_input_heads: 1
        num_forget_input_heads: 1
        num_reset_input_heads: 1
        num_weight_heads: 1
        num_forget_weight_heads: 1
        num_reset_weight_heads: 1
        add_bias: true
        normalization_function: null
        gradient_clipping: null
        kernel_size: null
        activation_function: null
    mlp_blocks:
      - activation_function: swiglu
        mlp_type: MLP
        add_bias: true
        intermediate_size: 2048
        dropout: 0
      - activation_function: swiglu
        mlp_type: MoE
        shared_intermediate_size: 512
        add_bias: true
        intermediate_size: 2048
        dropout: 0
        num_experts: 8
        num_experts_per_tok: 2
        shared_expert_gating: false
        normalized_topk: true
      - activation_function: swiglu
        mlp_type: MLP
        add_bias: true
        intermediate_size: 2048
        dropout: 0
      - activation_function: swiglu
        mlp_type: MLP
        add_bias: true
        intermediate_size: 2048
        dropout: 0

tuning_args:
  tuning_method: pretraining

save_args:
  save_path: dummy
  save_interval: 500

training_parameters:
  num_training_steps: 25000
  eval_interval: 2500000
  micro_batch_size: 128
  gradient_accumulation_steps: 1
  eval_during_training: false

optimizer_args:
  params_group_method: mup
  class_name: TorchAdamW
  class_args:
    lr: 3e-4
    weight_decay: 0.1
    betas:
      - 0.9
      - 0.95
    eps: 1e-10

lr_scheduler_args:
  lr_decay_style: cosine
  num_warmup_steps: 2500
  num_constant_steps: 0
  num_decay_steps: 97500

mixed_precision_args:
  dtype: bf16

distributed_args:
  fsdp_algorithm: 2
  stage: 3
  tensor_parallel_world_size: 1
